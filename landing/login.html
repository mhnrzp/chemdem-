<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chemdem — Login</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif; }
    body { background: #f9fafb; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }

    .card {
      background: white;
      border: 1.5px solid #e5e7eb;
      border-radius: 24px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 4px 40px rgba(0,0,0,0.06);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
      justify-content: center;
    }

    .logo-text { font-size: 22px; font-weight: 700; color: #111; }
    .logo-text span { color: #000DFF; }

    h1 { font-size: 22px; font-weight: 800; color: #111; text-align: center; margin-bottom: 8px; letter-spacing: -0.5px; }
    .subtitle { font-size: 14px; color: #6b7280; text-align: center; margin-bottom: 32px; line-height: 1.6; }

    label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 6px; }

    input {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid #e5e7eb;
      border-radius: 12px;
      font-size: 15px;
      color: #111;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 16px;
      background: #fafafa;
    }
    input:focus { border-color: #000DFF; background: white; }

    .btn {
      width: 100%;
      padding: 14px;
      background: #000DFF;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-top: 8px;
    }
    .btn:hover { background: #111; }
    .btn:active { transform: scale(0.98); }

    .error {
      display: none;
      background: #fee2e2;
      border: 1px solid #fecaca;
      color: #dc2626;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 13px;
      margin-bottom: 16px;
      text-align: center;
    }

    .badge {
      text-align: center;
      margin-top: 24px;
      font-size: 12px;
      color: #9ca3af;
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: #000DFF;
      text-decoration: none;
    }
    .back-link:hover { text-decoration: underline; }
  </style>
</head>

    <h1>Welcome back</h1>
    <p class="subtitle">Sign in to access the reaction prediction platform</p>

    <div class="error" id="errorMsg">❌ Incorrect username or password</div>

    <form onsubmit="handleLogin(event)">
      <label for="username">Username</label>
      <input type="text" id="username" placeholder="Enter username" autocomplete="username" />

      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Enter password" autocomplete="current-password" />

      <button type="submit" class="btn">Sign In →</button>
    </form>

    <div class="badge">University Research Project · Wren Group</div>
    <a href="/" class="back-link">← Back to homepage</a>
  </div>

  <script>
    // Check if already logged in
    if (sessionStorage.getItem('chemdem_auth') === 'true') {
      window.location.href = '/predict-panel.html';
    }

    function handleLogin(e) {
      e.preventDefault();
      const user = document.getElementById('username').value.trim();
      const pass = document.getElementById('password').value.trim();
      const err  = document.getElementById('errorMsg');

      if (user === 'chemdem' && pass === 'wrenlab2026') {
        sessionStorage.setItem('chemdem_auth', 'true');
        window.location.href = '/predict-panel.html';
      } else {
        err.style.display = 'block';
        document.getElementById('password').value = '';
        document.getElementById('password').focus();
      }
    }
  </script>
